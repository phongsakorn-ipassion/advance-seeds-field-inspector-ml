# Banana v1 YOLO26n-seg PoC training config.
#
# Rationale:
# - Dataset has 693 images, so this follows Ultralytics' small-dataset guidance:
#   lower LR, fewer epochs with patience, reduced mosaic, no mixup/copy-paste.
# - Keep imgsz=640 to match the mobile export contract, even though Roboflow
#   resized source images to 512x512.

model: yolo26n-seg.pt
data: configs/dataset.banana-v1.yaml
project: runs/banana-v1
name: banana-v1-poc

epochs: 50
patience: 20
imgsz: 640
batch: auto
workers: auto
device: auto
seed: 42
deterministic: true
pretrained: true
cache: auto
amp: auto

optimizer: auto
lr0: 0.001
lrf: 0.0495
momentum: 0.947
weight_decay: 0.00064
warmup_epochs: 1.0
cos_lr: true
close_mosaic: 10

mosaic: 0.5
mixup: 0.0
copy_paste: 0.0
scale: 0.56
translate: 0.07
fliplr: 0.5
flipud: 0.0
degrees: 2.0
shear: 0.0
hsv_h: 0.014
hsv_s: 0.5
hsv_v: 0.4

save: true
save_period: 10
plots: true
val: true
